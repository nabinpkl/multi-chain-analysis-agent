# Runtime-parity hermetic eval. Two cases share one fixture and one
# switch envelope; the only variable is the runtime enum. Phase 0 of
# the codex / pydantic-ai alignment work
#
# Pre-alignment state (HEAD as of this case landing):
#
#   * `runtime_parity.pydantic_ai`  ALL probes pass. judge_claim
#     fires per-claim and emits `mcae.gate.constitution` spans.
#
#   * `runtime_parity.codex`        `gate-constitution-fired`
#     FAILS. codex_driver.py imports only `judge_narrative`
#     (line 87 today); the per-claim constitution gate is missing.
#     This is the documented drift Phase 1 closes by extracting
#     `run_post_tools_phase` into a shared module both runtimes
#     consume.
#
# Phase 0 ships this case in the failing-on-codex state on purpose:
# it pins the drift as a CI regression signal so Phase 1's structural
# extraction has a deterministic pass/fail target.
#
# After Phase 1 lands, both cases pass and this file becomes the
# CI fence that catches future runtime divergence (e.g. if a
# behavior is added to one runtime but not the other).
#
# Operator setup (hermetic stack):
#
#     docker compose --profile eval up -d --build
#     just eval-hermetic evals/cases-hermetic/runtime_parity_wallet_profile.yaml
#
# The runtime is selected per-case via the proto enum on `inputs.runtime`,
# so a single invocation runs both. The case asserts gate-stack
# existence, NOT byte-equal narrative content: model nondeterminism
# would make a strict-equality probe flaky, while gate-firing is a
# deterministic structural property of each runtime's loop.
#
# Why `dontFabricate: false`: with the flag on, the structural gate
# preempts the constitution gate when chip values don't match the
# binding store within tolerance. The parity probe is about whether
# `judge_claim` fires AT ALL, so we let imperfect claims through to
# the constitution gate by switching dont_fabricate off. Other
# hermetic cases keep it on; this one deliberately relaxes it to
# isolate the constitution-gate-existence question.

- case_id: runtime_parity.pydantic_ai
  suite: runtime_parity_wallet_profile
  inputs:
    runtime: AGENT_RUNTIME_PYDANTIC_AI
    userQuestion: "Profile this wallet: ParityTestWallet1111111111111111111111111111. Use wallet_profile and describe what you observe in one or two short claims."
    context:
      liveWindowSecs: 60
    switches:
      stayInRole:
        defendChatTemplateSpoofing: true
        defendConstitutionJudge: true
        defendPersonaSwap: true
        defendDecodeAndExecute: true
        defendIdentityReveal: true
        defendOffDomain: true
      dontFabricate: false
      channels:
        narrativeOutputEnabled: true
        externalTextInputEnabled: true
  fixtures:
    wallet_profile:
      - addr: "ParityTestWallet1111111111111111111111111111"
        payload:
          addr: "ParityTestWallet1111111111111111111111111111"
          role: "NODE_ROLE_WHALE"
          community_id: 42
          stats:
            degree: 4
            total_volume_lamports: 75000000000.0
            in_volume_lamports: 50000000000.0
            out_volume_lamports: 25000000000.0
            bidir_volume_lamports: 0.0
            sol_degree: 4
            spl_degree: 0
          top_counterparties:
            - addr: "ParityCounterpartyA111111111111111111111111"
              volume: 40000000000.0
            - addr: "ParityCounterpartyB222222222222222222222222"
              volume: 20000000000.0
            - addr: "ParityCounterpartyC333333333333333333333333"
              volume: 15000000000.0
          age_in_window_secs: 45
  probes:
    - probe_id: turn-root-span-present
      kind: has_matching_span
      span_name: mcae.turn

    - probe_id: turn-tagged-as-eval
      kind: has_matching_span
      span_name: mcae.turn
      attrs:
        mcae.run.type: eval

    - probe_id: wallet-profile-primitive-called
      kind: tool_called_with_args
      tool_name: wallet_profile

    - probe_id: claim-emitted
      kind: has_matching_span
      span_name: mcae.claim.emitted

    - probe_id: narrative-emitted
      kind: has_matching_span
      span_name: mcae.narrative.emitted

    - probe_id: no-error-on-turn-root
      kind: no_span_with_status
      span_name: mcae.turn
      status: error

    - probe_id: gate-placeholder-fired
      kind: has_matching_span
      span_name: mcae.gate.placeholder

    - probe_id: gate-structural-fired
      kind: has_matching_span
      span_name: mcae.gate.structural

    # Load-bearing parity probe. Today: passes on pydantic-ai,
    # FAILS on codex. After Phase 1 of the alignment plan, passes
    # on both. The diagnostic angle is unambiguous because
    # `claim-emitted` above proves a claim WAS emitted; the only
    # explanation for `mcae.gate.constitution` being absent is
    # that judge_claim never ran.
    - probe_id: gate-constitution-fired
      kind: has_matching_span
      span_name: mcae.gate.constitution

    - probe_id: gate-narrative-constitution-fired
      kind: has_matching_span
      span_name: mcae.gate.narrative_constitution

