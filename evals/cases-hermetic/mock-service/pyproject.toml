[project]
name = "eval-mock"
version = "0.1.0"
description = "Hermetic-eval mock substrate. Serves the same wire surface as the Rust data plane (`/turn/*`, `/primitive/*`, `/mcp`) backed by a fixture store the eval runner controls via `/eval/setup`. One process, one port (default 8005), two seams: FastMCP proxy for codex, FastAPI HTTP shim for pydantic-ai's PrimitiveClient. Schemas come from a checked-in `schemas.json` snapshot generated by `backend/src/bin/dump_mcp_schemas.rs`, so codex sees the same tool descriptors live Rust would advertise."
requires-python = ">=3.14"

dependencies = [
    # FastAPI for the HTTP shim + setup + health routes.
    "fastapi>=0.118",
    "uvicorn[standard]>=0.36",
    # Wire-format encoders. The mock reuses `agent_service.test_support.primitive_responses`
    # for the binary proto envelopes Rust would emit; pinning protobuf
    # here ensures compatibility with the generated multichain.wire.* modules.
    "protobuf>=7.34.1",
    # FastMCP for the `/mcp` proxy. Latest stable as of 2026-05-13
    # (3.2.4, released 2026-04-14 per pypi).
    "fastmcp>=3.2.4",
    # `agent-service` provides the proto-generated wire types and the
    # test_support encoders. Editable path dep so mock-service rebuilds
    # are cheap during dev.
    "agent-service",
]

[tool.uv.sources]
agent-service = { path = "../../../agent-service", editable = true }

[tool.uv]
# Mirror the agent-service override: opentelemetry-proto still pins
# `protobuf<7.0`, but our generated wire types live in agent-service
# which is built against protobuf 7.x. Without this override the
# resolver dead-ends. Same rationale as
# `agent-service/pyproject.toml::override-dependencies`.
override-dependencies = ["protobuf>=7.34.1"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.hatch.build.targets.wheel]
packages = ["src/eval_mock"]
