services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: multichain-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: multichain-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=multichain
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  state-reset:
    container_name: multichain-state-reset
    build:
      context: .
      dockerfile: docker/state-reset/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - REDPANDA_BROKERS=redpanda:9092
    restart: "no"

  api:
    container_name: multichain-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8002}:${PORT:-8002}"
    env_file:
      - ./.env
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=multichain
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - KAFKA_BROKERS=redpanda:9092
      - KAFKA_TOPIC_RAW_EDGES=solana.raw-edges
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      state-reset:
        condition: service_completed_successfully
    restart: unless-stopped

  agent-service:
    container_name: multichain-agent-service
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file:
      - ./.env
    environment:
      # Rust data plane URL (intra-compose hostname).
      - DATA_PLANE_URL=http://api:8002
      # AGENT_API_KEY (OpenRouter) is sourced from the project .env above.
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
