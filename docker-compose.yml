services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: multichain-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: multichain-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./infra/z_clickhouse-overrides.xml:/etc/clickhouse-server/config.d/z_overrides.xml:ro
    environment:
      - CLICKHOUSE_DB=multichain
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  state-reset:
    container_name: multichain-state-reset
    build:
      context: .
      dockerfile: docker/state-reset/Dockerfile
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - REDPANDA_BROKERS=redpanda:9092
    restart: "no"

  api:
    container_name: multichain-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8002}:${PORT:-8002}"
    env_file:
      - ./.env
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_DB=multichain
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      - KAFKA_BROKERS=redpanda:9092
      - KAFKA_TOPIC_RAW_EDGES=solana.raw-edges
      # Internal HTTP listener carrying /turn/* and /primitive/*. Bound
      # inside the container only (NOT in `ports:` above) so the
      # cloudflared tunnel and host-bound curl cannot reach it; the
      # agent-service container talks to it via the docker compose
      # network as http://api:8004. See backend/src/api/mod.rs.
      - INTERNAL_PORT=8004
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      state-reset:
        condition: service_completed_successfully
    restart: unless-stopped

  agent-service:
    container_name: multichain-agent-service
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    # `host.docker.internal` is the hostname the LM Studio proxy
    # (GET /agent/local/models) and the per-role local-provider path
    # in agent_service.llm.make_model resolve to when LOCAL_LLM_BASE_URL
    # is unset. Mac/Windows Docker Desktop provides this name
    # automatically; on Linux this `extra_hosts` line is what supplies
    # it (`host-gateway` is a magic value Docker substitutes for the
    # host bridge IP). Harmless on Mac/Windows.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env
    environment:
      # Rust data plane internal listener (intra-compose hostname).
      # Carries /turn/* and /primitive/*. NOT host-published; only
      # reachable from the docker compose network. See
      # backend/src/api/mod.rs::internal_router and the api service's
      # INTERNAL_PORT env var.
      - DATA_PLANE_URL=http://api:8004
      # AGENT_API_KEY (OpenRouter) is sourced from the project .env above.
      # CORS origin for browser fetches. Frontend dev runs on :3008
      # (see .claude/launch.json). Override per environment.
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3008}
      # Ship 1 of agent-observability (ADR 13). Send OTel spans to
      # the collector sidecar; collector fans out to CH-A `otel` DB
      # (queryable alongside multichain) and to Langfuse. Setting
      # this here means the agent-service Python code does not need
      # to know the endpoint; otel.py reads OTEL_EXPORTER_OTLP_ENDPOINT.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      # Filesystem root for persisted thread state. ThreadRegistry
      # writes `<THREAD_ROOT>/threads/<thread_id>/state.json` at the
      # end of every turn so a container restart can reload the
      # conversation. Bind-mounted to `./data/agent-service/threads`
      # on the host so state survives `docker compose down` and is
      # inspectable from the host with `ls`.
      - THREAD_ROOT=/var/threads
    volumes:
      - ./data/agent-service/threads:/var/threads
    depends_on:
      api:
        condition: service_started
      otel-collector:
        condition: service_started
    restart: unless-stopped

  otel-collector:
    # Ship 1 of agent-observability (ADR 13). One ingest, multiple
    # exporters. Runs the contrib distribution because the
    # `clickhouse` exporter (and later the `otlphttp/langfuse`
    # exporter) live in contrib, not core. Pinned to a specific
    # release tag so collector behaviour is reproducible across
    # rebuilds. The contrib image is the official OpenTelemetry
    # project release; passes the AGENTS.md maintenance bar.
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: multichain-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      # Substituted into the clickhouse exporter password field via
      # ${env:CLICKHOUSE_PASSWORD} in the config.
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set in .env}
      # Pre-computed Basic auth header for the otlphttp/langfuse
      # exporter (base64 of "$PUBLIC_KEY:$SECRET_KEY"). See .env.example.
      - LANGFUSE_OTEL_AUTH_BASIC=${LANGFUSE_OTEL_AUTH_BASIC:?LANGFUSE_OTEL_AUTH_BASIC must be set in .env}
    ports:
      # 4318 = OTLP HTTP, 4317 = OTLP gRPC. Both bound on host for
      # local debugging (curl/grpcurl from host into the collector).
      - "4318:4318"
      - "4317:4317"
    depends_on:
      clickhouse:
        condition: service_healthy
      # The clickhouse exporter requires the `otel` database to exist
      # (its `create_schema: true` only creates tables, not databases
      # in v0.118.0). state-reset pre-creates it on every boot.
      state-reset:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Langfuse self-hosted v3 stack (Ship 1 step C of agent-observability,
  # ADR 13). Six services. Sourced from the official langfuse v3.172.1
  # docker-compose.yml at github.com/langfuse/langfuse and adapted:
  #   - all langfuse-* prefixed to avoid colliding with our existing
  #     `clickhouse` (CH-A) and to namespace volumes
  #   - pinned to LANGFUSE_VERSION (was floating `:3` upstream;
  #     AGENTS.md "no floating tags")
  #   - langfuse-clickhouse (CH-B) keeps its ports internal-only since
  #     only langfuse-web/worker need to reach it; CH-A on :8123/:9000
  #     stays the user-facing one
  #   - all bound to 127.0.0.1 by default (the cloudflared tunnel,
  #     when active, picks specific services to expose)
  #
  # Bootstrap: on first boot, langfuse-web reads LANGFUSE_INIT_*
  # envvars and creates org + project + admin user + project API
  # keypair. Idempotent on subsequent boots.
  # ---------------------------------------------------------------------

  langfuse-postgres:
    image: docker.io/postgres:17
    container_name: multichain-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:?LANGFUSE_POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - ./data/langfuse-postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  langfuse-redis:
    image: docker.io/redis:7
    container_name: multichain-langfuse-redis
    restart: unless-stopped
    command: >
      --requirepass ${LANGFUSE_REDIS_AUTH:?LANGFUSE_REDIS_AUTH must be set in .env}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/langfuse-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  langfuse-minio:
    # Chainguard distroless minio image is what upstream langfuse compose
    # uses; keep parity. Bucket pre-created by the entrypoint shell.
    image: cgr.dev/chainguard/minio
    container_name: multichain-langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD:?LANGFUSE_MINIO_ROOT_PASSWORD must be set in .env}
    ports:
      # 9090 = host-exposed S3 API (langfuse-web rewrites media-upload
      # presigned URLs to localhost:9090 for browser-direct uploads).
      # 9091 = host-exposed MinIO admin console.
      - "9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - ./data/langfuse-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  langfuse-clickhouse:
    # CH-B per ADR 13. Separate volume + password from CH-A so workload
    # + schema isolation is total. No host port mapping; only langfuse-
    # web/worker reach it via the compose network.
    image: docker.io/clickhouse/clickhouse-server:25.3
    container_name: multichain-langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?LANGFUSE_CLICKHOUSE_PASSWORD must be set in .env}
    volumes:
      - ./data/langfuse-clickhouse:/var/lib/clickhouse
      - ./data/langfuse-clickhouse-logs:/var/log/clickhouse-server
      - ./infra/z_clickhouse-overrides.xml:/etc/clickhouse-server/config.d/z_overrides.xml:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  langfuse-worker:
    # Async event processor: pulls from Redis queue, fetches raw events
    # from MinIO, upserts into langfuse-clickhouse. Required for the v3
    # ingestion path; without it ingestion accepts events but nothing
    # ever materializes in the UI.
    image: docker.io/langfuse/langfuse-worker:${LANGFUSE_VERSION:?LANGFUSE_VERSION must be set in .env}
    container_name: multichain-langfuse-worker
    restart: unless-stopped
    depends_on: &langfuse-deps
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
    ports:
      - "127.0.0.1:3030:3030"
    environment: &langfuse-env
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:${LANGFUSE_POSTGRES_PASSWORD}@langfuse-postgres:5432/postgres
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_ROOT_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH}
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    # UI + API. Reads LANGFUSE_INIT_* envvars on first boot to bootstrap
    # the org/project/user/keypair. Public on :3000.
    image: docker.io/langfuse/langfuse:${LANGFUSE_VERSION:?LANGFUSE_VERSION must be set in .env}
    container_name: multichain-langfuse-web
    restart: unless-stopped
    depends_on: *langfuse-deps
    ports:
      # Host :3001 → container :3000. The default :3000 collides with
      # Next dev servers (frontend); pick a stable alt that other
      # tooling won't grab. Internally to the compose network langfuse
      # still listens on 3000, so the otel-collector exporter and
      # NEXTAUTH_URL inside the network use port 3000.
      - "3001:3000"
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-multichain}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Multichain}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-agent}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-Agent}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["prod"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
