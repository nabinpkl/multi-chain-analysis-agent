version: v2
plugins:
  # Rust: Anthropic's `buffa` (pure-Rust protobuf with editions, JSON,
  # zero-copy views). Two-plugin pattern per the buffa README:
  #   protoc-gen-buffa            → per-message generated code
  #   protoc-gen-buffa-packaging  → cargo-friendly mod.rs wiring
  - local: protoc-gen-buffa
    out: backend/src/wire/generated
    opt:
      # Emit proto canonical JSON serde derives so the same generated
      # types can be wire-encoded as binary protobuf OR canonical JSON
      # (curl-debuggable fallback) without an adapter layer.
      - json=true
  - local: protoc-gen-buffa-packaging
    out: backend/src/wire/generated
    strategy: all

  # Python: Google's official protobuf-python plugin (built into protoc).
  # Writes a top-level `multichain` package directly under `src/` so the
  # generated absolute imports (`from multichain.wire.shared.v1 import ...`)
  # resolve without sys.path tricks. Python sibling of `agent_service`.
  - protoc_builtin: python
    out: agent-service/src

  # TypeScript: Buf's @bufbuild/protoc-gen-es. Output is ESM TS with
  # full types + runtime via @bufbuild/protobuf.
  - local: ./frontend/node_modules/.bin/protoc-gen-es
    out: frontend/src/lib/wire
    opt:
      - target=ts
      # Drop the import extension. Next.js's bundler resolution doesn't
      # follow the `.js` -> `.ts` convention out of the box; the bare
      # form works in both Node ESM and Next bundler contexts.
      - import_extension=none
