[project]
name = "agent-service"
version = "0.1.0"
description = "Python agent plane for multi-chain-analysis-engine. Pydantic AI orchestration, calls Rust data plane on :8002 for primitives."
requires-python = ">=3.12"
dependencies = [
    # Pydantic AI native OpenRouter provider lives in this slim install.
    # Per the migration plan we use OpenRouter free-tier for both
    # primary (nemotron) and policy (gpt-oss) models.
    "pydantic-ai-slim[openai]>=1.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sse-starlette>=2.1",
    "httpx>=0.27",
    "structlog>=24.4",
    "protobuf>=7.34.1",
]

[dependency-groups]
dev = [
    # Wiring-only pytest layer. No LLM calls. The total baseline-test
    # runtime budget is <5s, which is also our smoke check that no
    # real OpenRouter call has snuck in.
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.30",
    "dirty-equals>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# `multichain` is the auto-generated proto package (sibling of
# `agent_service` so the generated absolute imports resolve cleanly).
# Both ship in the wheel.
packages = ["src/agent_service", "src/multichain"]

[tool.uv]
package = true

[tool.pytest.ini_options]
# `auto` means async test functions and fixtures don't need
# `@pytest.mark.asyncio`. Keeps the test surface clean.
asyncio_mode = "auto"
testpaths = ["tests"]
# Surface DeprecationWarning so codegen / pydantic / pydantic-ai
# version drift bubbles up as a test signal, not silent rot.
filterwarnings = [
    "error::DeprecationWarning:agent_service.*",
]
