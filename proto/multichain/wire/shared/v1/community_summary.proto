syntax = "proto3";

package multichain.wire.shared.v1;

import "multichain/wire/shared/v1/scope.proto";

// Input to the `community_summary` primitive.
message CommunitySummaryInput {
  uint32 community_id = 1;
  TimeScope time_scope = 2;
}

// Output of the `community_summary` primitive. The agent reads this
// to build the community-context claim.
message CommunitySummaryOutput {
  uint32 community_id = 1;
  // Number of wallets in the community within the current scope.
  uint32 size = 2;
  // Sum of all internal + external edge volumes (lamports).
  double total_volume = 3;
  // Edge volume strictly within the community (lamports).
  double internal_volume = 4;
  // Edge volume crossing community boundary (lamports).
  double external_volume = 5;
  uint32 edge_count = 6;
  // Capped at K (impl-defined, currently 5).
  repeated TopWallet top_wallets = 7;
}

message TopWallet {
  string addr = 1;
  uint32 degree = 2;
  // Lamports.
  double volume = 3;
}
