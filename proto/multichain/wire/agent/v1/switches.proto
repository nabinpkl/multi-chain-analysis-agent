syntax = "proto3";

package multichain.wire.agent.v1;

// Ship 3.5 ablation switches. Each field is a behavior contract;
// when true, the agent has that behavior. Defaults reproduce the
// production preset (everything except ground_truth_match).
//
// SECURITY: switches are reachable from any client. Project is a
// builder portfolio, not a product; we explicitly do not hide internals.
// If this code ever serves real end-user traffic, lock the switch
// surface server-side.
message AgentSwitches {
  // Identity, scope, conduct rules. Sub-message so each defense
  // surface can be ablated independently for the article-path
  // comparison work; the legacy single-bool meaning is preserved
  // by `defend_constitution_judge` (the LLM-side gate that the old
  // bool gated). See #35.
  StayInRoleSwitches stay_in_role = 1;
  // Numbers and entities in claims must come from real tool output.
  // With this off, the model can invent values that no tool returned.
  bool dont_fabricate = 2;
  // Three sub-modes of consistency check across the chain.
  CrossCheckSwitches cross_check = 3;
  // Ship 4: agent recognizes repeat questions in the same thread,
  // re-fetches the prior turn's primitives, deterministically diffs
  // against the prior outputs, and surfaces only what changed.
  bool dont_repeat_yourself = 4;
  // Cockpit: per-channel I/O toggles for the agent's communication
  // surface. Each channel pairs a switch with a deterministic
  // observable (an `mcae.turn.channels.*` span attribute) so eval
  // probes can assert the off-state actually held.
  ChannelSwitches channels = 5;
}

// Cockpit-style I/O channel toggles. Each switch controls one of
// the agent's input or output text surfaces. Defaults are the
// production preset (every channel on); proto3 false default
// deliberately puts the unsafe state behind explicit construction
// so a caller forgetting a field gets a noticeably restrictive
// agent rather than a silently-leaky one.
message ChannelSwitches {
  // When false, the agent's free-form Narrative output is replaced
  // with empty text at the loop driver before the SSE Narrative
  // frame is emitted. The model still generates prose; we drop it
  // before any consumer sees it. The `mcae.narrative.emitted` span
  // still fires (with `length_chars=0` and `narrative.suppressed
  // =true`) so probes can assert the off-state held without
  // inspecting frontend state.
  //
  // Use cases: stress-test whether the agent can carry a turn
  // through Claim chips alone; remove Narrative as a potential
  // exfil channel for prompt-injected text; measure how much of
  // a turn's value lives in structured Claims vs interpretive prose.
  bool narrative_output_enabled = 1;
  // When false, primitive tool outputs are sanitized before being
  // wrapped in <external_data>: every string field outside the
  // constrained-format allowlist (base58 address, enum role, mint
  // id) is replaced with a placeholder. Today no primitive emits
  // untrusted text so this switch is forward-looking, but it is
  // wired now so future primitives that surface untrusted strings
  // slot in without a schema change.
  bool external_text_input_enabled = 2;
}

// Per-defense ablation surface for the "stay in role" family.
// Each field is a defense the article toggles to measure which
// vectors the underlying model resists without our enforcement.
//
// Defaults: caller MUST set every field explicitly (proto3 false
// default is deliberately the unsafe state so a caller forgetting
// a field reports raw model behavior, not an accidental "all
// defenses on by silent default").
message StayInRoleSwitches {
  // Boundary rejection of chat-template tokens, closing pseudo-tags,
  // HTML script tags. Deterministic input rail; when off, unsafe
  // input flows to agent.run() unchanged. See `boundary.py` and #33.
  bool defend_chat_template_spoofing = 1;
  // LLM-side constitution gate that judges Claim + Narrative against
  // policy_v4 rules. This preserves the legacy semantic of the
  // bool stay_in_role: when off, the constitution gate spans
  // (mcae.gate.constitution, mcae.gate.narrative_constitution) are
  // not emitted and gate verdicts default to approved.
  bool defend_constitution_judge = 2;

  // Per-prompt-rule defenses (#36 phase 4). Each maps to dropping
  // a specific <rule id="..."> block from `system_v4.txt` via the
  // composer in `prompts/composer.py`. When off, the model never
  // sees that rule and the article can measure raw model behavior
  // on the corresponding vector.

  // Drops `defense:user_question_untrusted`. The rule covers
  // persona-swap and decode-and-execute together (one tightly
  // worded paragraph), so both `defend_persona_swap` and
  // `defend_decode_and_execute` map to the same drop. Either flag
  // off keeps the rule; both off drops it.
  bool defend_persona_swap = 3;
  bool defend_decode_and_execute = 4;
  // Drops `defense:identity`. When off the agent will name the
  // underlying LLM if asked.
  bool defend_identity_reveal = 5;
  // Drops `defense:off_domain`. When off the agent's "decline
  // off-topic" rule disappears.
  bool defend_off_domain = 6;
}

// Sub-modes of cross_check. Two independent toggles after ship 5a
// retired text_match. Both advisory in the strict merge.
message CrossCheckSwitches {
  // LLM-driven coherence check: does the model's prose use its
  // cited chip values consistently? Recall-based, paraphrase-robust.
  bool paraphrase_aware_match = 1;
  // Re-query the source-of-truth database, verify prose against
  // actual data. NOT recall-based. Stub in ship 3.5; the real
  // implementation lands in ship 5b with warehouse primitives.
  bool ground_truth_match = 2;
}
