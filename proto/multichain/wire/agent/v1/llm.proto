syntax = "proto3";

package multichain.wire.agent.v1;

// Per-request LLM provider override. Empty / missing = use the
// production preset (env-driven OpenRouter for every role); the
// production frontend never sets this field, so prod traffic is
// unaffected.
//
// The dev builder view in the frontend exposes a Models section that
// writes per-role choices into Zustand-backed localStorage and stamps
// them onto every outgoing AgentRequest. The agent-service reads the
// override in the loop driver and rebuilds the relevant agent for
// that turn (sub-millisecond, no I/O) so the per-role model swap
// takes effect immediately without restarting the service.
//
// The override travels per-request rather than living in server state
// for two reasons: the existing `AgentSwitches` pattern is already
// per-request (wire field, browser-stored), so this matches; and the
// blast radius of a leaked dev config is bounded to "this browser"
// instead of "the whole agent-service process."
message LlmOverride {
  RoleOverride primary = 1;
  RoleOverride policy = 2;
  RoleOverride judge = 3;
}

// One role's pinned provider + model id. Empty `provider` means
// "fall through to default" (env-driven OpenRouter for that role).
// `model_id` is meaningful only when `provider == "local"`; for
// "openrouter" the env-default model id wins (the dev pain we are
// solving is OpenRouter latency, not OpenRouter model selection).
message RoleOverride {
  // "" | "openrouter" | "local". Unrecognized values are treated as
  // "" by the backend (fall through to env-driven OpenRouter); the
  // wire is permissive on purpose so a future provider can be added
  // without a proto bump on the frontend side.
  string provider = 1;
  // For provider="local": the model id loaded in LM Studio (e.g.
  // "qwen2.5-7b-instruct"). The frontend populates this from the
  // agent-service's GET /agent/local/models proxy. Empty when
  // provider is "" or "openrouter".
  string model_id = 2;
}
