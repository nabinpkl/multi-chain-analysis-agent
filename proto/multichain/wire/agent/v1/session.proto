syntax = "proto3";

package multichain.wire.agent.v1;

import "multichain/wire/agent/v1/entity.proto";
import "multichain/wire/agent/v1/llm.proto";
import "multichain/wire/agent/v1/switches.proto";

// User question + ViewContext. `thread_id` is None on the first
// send of a fresh conversation; the backend mints one and returns
// it. Subsequent follow-ups echo the prior thread_id.
//
// `switches` defaults to the production preset (everything except
// ground_truth_match). `show_trace` controls whether GatePath
// frames are emitted; trace is always built and ledgered regardless.
//
// `run_type` discriminates production traffic from eval-driven
// traffic in the OTel/Langfuse/ClickHouse trace store. Empty
// string maps to "production" on the agent side. The eval CLI
// sets "eval" so analytics filters can exclude eval volume from
// production aggregates without running a separate agent process.
// Conventional values: "" | "production" | "eval" | "dev". Other
// values pass through unchanged so callers can extend without a
// proto bump.
message AgentRequest {
  string user_question = 1;
  ViewContext context = 2;
  optional string thread_id = 3;
  AgentSwitches switches = 4;
  bool show_trace = 5;
  string run_type = 6;
  // Dev-only per-role LLM provider override. Empty / missing = use
  // the production preset (env-driven OpenRouter). Set by the
  // frontend builder view's Models section; production frontend
  // never populates this field. See llm.proto for shape.
  LlmOverride llm_override = 7;
}

// Final SSE event payload. Emitted as the `done` event by the SSE
// handler. `elapsed_ms` is u32 (caps at ~50 days). `trace_id` is the
// 32-hex-char OTel trace id for this turn (Ship 1 of agent-
// observability, ADR 13); the frontend uses it to deep-link into
// Langfuse for the visual flame graph. Empty string means trace
// emission was disabled (OTEL_SDK_DISABLED) or otherwise unavailable.
//
// `role_timings` carries the wall-time spent in each LLM role for
// this turn (sum across multiple calls within the same role on the
// same turn; the policy bucket fires multiple times per turn for
// constitution gates + repeat detection, so the sum is the useful
// "how much wall time did this role consume" view). Builder view's
// Models panel reads it back to surface "last call elapsed" under
// each role row, so a dev sees which role is dragging a turn
// without trawling docker logs.
message AgentDone {
  uint32 elapsed_ms = 1;
  string trace_id = 2;
  RoleTimings role_timings = 3;
}

// Per-role wall-time tally for one turn. Values are integer
// milliseconds; zero means "no calls fired in that role this turn"
// (e.g. judge role isn't on the chat path today, so it stays 0).
message RoleTimings {
  uint32 primary_ms = 1;
  uint32 policy_ms = 2;
  uint32 judge_ms = 3;
}
